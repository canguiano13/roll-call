<!DOCTYPE html>
<html>
<header>
  <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed" rel="stylesheet" type="text/css">
  <!-- link the stylesheet here-->
  <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='styles/styles.css')}}">
</header>

<body>
  <button type="button" id="homepage">HomePage</button>

  <script type="text/javascript">
    document.getElementById("homepage").onclick = function() {
      window.location.href = "{{ url_for('routes.index') }}";
    };
  </script>

  <main>
    <h1 id="title">Create an Event</h1>
    <div class="master-div-style">
      <p id="description">Tell us more about this event.</p>
      <form id="survey-form" action="/do-something" method="post" enctype="multipart/form-data">
        
        <!-- Event Title -->
        <div class="form-rows">
          <div class="labels">
            <label for="name" id="name-label">Title</label>
          </div>
          <div class="fields">
            <input type="text" id="name" class="input-fields" placeholder="Event Title" required>
          </div>
        </div>

        <!-- Event Description -->
        <div class="form-rows">
          <div class="labels">
            <label for="event-details">Where will your Event be.</label>
          </div>
          <div class="fields">
            <textarea id="event-details" class="input-fields" name="event-details" cols="1" rows="3" placeholder="Event Location"></textarea>
          </div>
        </div>

        <!-- Event Date -->
        <div class="form-rows">
          <div class="labels">
            <label for="event-date">Event Date</label>
          </div>
          <div class="fields">
            <input type="date" id="event-date" class="input-fields" required>
          </div>
        </div>

        <!-- Event Time -->
        <div class="form-rows">
          <div class="labels">
            <label for="event-time">Event Time</label>
          </div>
          <div class="fields">
            <input type="time" id="event-time" class="input-fields" required>
          </div>
        </div>

        <!-- Image Upload -->
        <div class="form-rows">
          <div class="labels">
            <label for="event-image">Upload an Event Image</label>
          </div>
          <div class="fields">
            <input type="file" id="event-image" name="event-image" accept="image/*">
          </div>
        </div>

        <!-- Submit Button -->
        <button class="button" id="submit" type="submit">Submit</button>

      </form>
    </div>
  </main>
</body>

</html>
