<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- link the stylesheet here-->
    <link rel= "stylesheet" type="text/css" href= "{{url_for('static',filename='styles/styles.css')}}">
  </head>

  <body>
    <!-- redirect to homepage-->
    <button type="button" id="homepage">Home</button>
    <script type="text/javascript">
      document.getElementById("homepage").onclick = function() {
        window.location.href = "{{ url_for('routes.index') }}";
      };
    </script>

    <!--main form-->
    <h1>Create your Account</h1>
    <p>Sign up to save your past events!</p>
    <!--TODO fix action attribute to point to function that handles sign up-->
    <form action=''>
      <fieldset>
        <label>Enter Your First Name: <input type="text" name="first-name" required /></label>
        <label>Enter Your Last Name: <input type="text" name="last-name" required /></label>
        <label>Enter Your Email: <input type="email" name="email" required /></label>
        <label>Create a New Password: <input type="password" name="password" required /></label>
      </fieldset>
      
      <fieldset>
        <label>
          <input type="checkbox" name="terms" class="inline" required /> I accept the <a href="/static/termsandconditions.txt">terms and conditions</a>
        </label>
      </fieldset>

      <fieldset>
        <label>Upload a profile picture: <input type="file" name="file" /></label>
      </fieldset>
      <input type="submit" value="Submit" />
    </form>

  </body>
</html>
