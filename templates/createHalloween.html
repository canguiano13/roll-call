<!DOCTYPE html>
<html>
<head>
  <title>Halloween Party!</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed" rel="stylesheet" type="text/css">
  <!-- link the stylesheet here-->
  <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='styles/styles.css')}}">
</head>

<body>
  <!--redirect to home page-->
  <nav class="home-navbar">
  <button type="button" id="homepage" onclick="window.location.href = '/'">Home</button>
  {% if current_user.is_authenticated %}
  <p>Logged in as {{ current_user.first_name }} {{ current_user.last_name }}</p>
  {% endif %}
  </nav>

  <main>
    <h1 id="title">Create an Event for a Halloween Party!!</h1>
    <div class="master-div-style">
      <p id="description">Start by telling us more about the Halloween party!</p>
      <!--action defines where to send form data. can send to an animation/share page-->
      <form id="survey-form" action="/createevent" method="post" enctype="multipart/form-data">
        
        <!-- Event Title -->
        <div class="form-rows">
          <div class="labels">
            <label for="event_title" id="name-label">Who's hosting the Halloween Party (60 char. max):</label>
          </div>
          <div class="fields">
            <input name="event_title" id="event-title" class="input-fields" placeholder="{{ current_user.first_name }} {{ current_user.last_name }}'s Halloween Party" type="text" required minlength = "1" maxlength = "60">
          </div>
        </div>

        <!-- Event Address -->
        <div class="form-rows">
          <div class="labels">
            <label for="event_address">Halloween Party Location:</label>
          </div>
          <div class="fields">
            <textarea name="event_address" id="event-description" class="input-fields"  placeholder="Event Location" cols="1" rows="3"></textarea>
          </div>
        </div>

        <!-- Event Date -->
        <div class="form-rows">
          <div class="labels">
            <label for="event_date">Halloween Party Date:</label>
          </div>
          <div class="fields">
            <input name="event_date" id="event-date" class="input-fields" type="date" required>
          </div>
        </div>

        <!-- Event Time -->
        <div class="form-rows">
          <div class="labels">
            <label for="event_time">Halloween Party Start Time:</label>
          </div>
          <div class="fields">
            <input name="event_time" id="event-time" class="input-fields" type="time" required>
          </div>
        </div>

        <!-- Image Upload -->
        <!--
        <div class="form-rows">
          <div class="labels">
            <label for="event_img">Upload a flyer! (optional)</label>
          </div>
          <div class="fields">
            <input name="event_img" id="event-image" type="file"  accept="image/*">
          </div>
        </div><br>
        -->

        <!-- Submit Button -->
        <br>
        <button class="button" id="submit" type="submit">Submit</button>

      </form>
    </div>
  </main>
  <!-- ─── FUTURE-DATE VALIDATION SCRIPT ───────────────────────────── -->
  <script>
    document.getElementById('survey-form').addEventListener('submit', e => {
      const form = e.target;

      /* 1. Let built-in HTML5 rules fire first */
      if (!form.checkValidity()) {
        e.preventDefault();
        form.reportValidity();
        return;
      }

      /* 2. Combine date + time and ensure it’s later than now */
      const chosen = new Date(`${form.event_date.value}T${form.event_time.value}`);
      const now    = new Date();

      if (chosen <= now) {                       // same instant or earlier
        e.preventDefault();
        alert('Please pick a date & time later than right now.');
      }
    });
  </script>
</body>

</html>
